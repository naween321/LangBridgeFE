kind = "web"
previewPath = "/"
title = "LexAI - AI Legal Assistant"
version = "1.0.0"
id = "artifacts/lexai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25802

[services.development]
run = "pnpm --filter @workspace/lexai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lexai", "run", "build" ]
publicDir = "artifacts/lexai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25802"
BASE_PATH = "/"
